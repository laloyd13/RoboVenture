name: roboventure
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  http: ^1.6.0
  path_provider: ^2.1.5
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8
  device_preview: ^1.3.1
  loading_animation_widget:
  gal: 2.3.2  # gallery access
  shared_preferences: ^2.2.0
  vibration: ^2.0.0          # reliable haptic/vibration on Android & iOS
  audioplayers: ^6.0.0       # cross-platform audio for "time's up" alert
  sound_mode: ^3.0.0  # detects silent/vibrate/normal sound mode

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: "^0.14.4"
  flutter_lints: ^6.0.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"
  android_icon_name: "ic_launcher_roboventure"

  web:
    generate: true
    image_path: "assets/logo.png"
    background_color: "#ffffff"
    theme_color: "#ffffff"

flutter:
  uses-material-design: true
  assets:
    - assets/RV_logo.png
    - assets/CreoLogo.png
    - assets/sounds/timesup.mp3